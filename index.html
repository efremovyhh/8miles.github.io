<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мой Музыкальный Плеер</title>
    <style>
        /* Общие стили для фона */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #c62e16, #231b1b);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
        }

        /* Контейнер плеера */
        .player-card {
            background: #0b5dcfbb;
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
            width: 320px;
            text-align: center;
        }

        .track-info {
            margin-bottom: 20px;
        }

        .track-name {
            font-size: 1.2rem;
            font-weight: bold;
            color: #333;
            margin: 0;
        }

        .artist-name {
            font-size: 0.9rem;
            color: #777;
        }

        /* Стилизация стандартного аудио-тега */
        audio {
            width: 100%;
            height: 40px;
            outline: none;
        }

        /* Кастомный акцент (через CSS переменные браузера) */
        audio::-webkit-media-controls-enclosure {
            border-radius: 10px;
            background-color: #f1f3f4;
        }

        .instructions {
            margin-top: 15px;
            font-size: 0.8rem;
            color: #999;
            line-height: 1.4;
        }
    </style>
</head>
<body>

<div class="player-card">
    <div class="track-info">
        <p class="track-name">8 миля</p>
        <p class="artist-name">Медкид</p>
    </div>

    <audio controls>
        <source src="audio/1.mp3" type="audio/mpeg">
    </audio>

    <div class="instructions">
        <p>Йоу йоу йоу Это Медкид</p>
    </div>
</div>
</body>
</html>
